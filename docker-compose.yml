services:
  db:
    image: postgres:15
    restart: always
    environment:
      # Ці параметри створюють базу при першому запуску
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Artur190905
      POSTGRES_DB: car_rental
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./rentAuto-api
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      # Використовуємо ті ж самі дані + хост 'db'
      DATABASE_URL: "postgresql://postgres:Artur190905@db:5432/car_rental"
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: car_rental

  frontend:
    build: ./rentAuto-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: