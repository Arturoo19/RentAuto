<section class="faq-section">
  <h2 class="faq-title">Preguntas frecuentes</h2>
  <p class="faq-subtitle">¿No encuentras lo que buscas? Pregúntanos directamente.</p>

  <div class="faq-list">
    <div
      class="faq-item"
      *ngFor="let item of faqs; let i = index"
      [class.open]="openIndex === i"
      (click)="toggle(i)"
    >
      <div class="faq-question">
        <span>{{ item.question }}</span>
        <span class="faq-icon">{{ openIndex === i ? '−' : '+' }}</span>
      </div>
      <div class="faq-answer" [style.maxHeight]="openIndex === i ? '300px' : '0'">
        <p>{{ item.answer }}</p>
      </div>
    </div>
  </div>

  <div class="faq-bot">
    <p>¿Tienes más preguntas?</p>
    <button class="bot-btn" (click)="openChat()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path
          d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"
        />
      </svg>
      Hablar con soporte en vivo
    </button>
  </div>
</section>
