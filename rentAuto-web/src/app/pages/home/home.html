<section class="hero">
  <div class="hero-container">
    <!-- LEFT -->
    <div class="hero-left">
      <h1>Alquila tu coche fácil</h1>
      <p>Encuentra el mejor coche para tu viaje</p>
    </div>

    <!-- RIGHT -->
    <div class="search-box">
      <label>Recoger en</label>
      <input type="text" placeholder="Ciudad o aeropuerto" />

      <div class="dates">
        <div>
          <label>Desde</label>
          <input type="date" [(ngModel)]="startDate" name="startDate" />
        </div>
        <div>
          <label>Hasta</label>
          <input type="date" [(ngModel)]="endDate" name="endDate" />
        </div>
      </div>

      <div class="checkbox">
        <span>Tengo un código de descuento</span>
        <input type="checkbox" [(ngModel)]="promoActive" name="promoCheck" />
      </div>

      <div *ngIf="promoActive" class="promo-input">
        <input
          type="text"
          [(ngModel)]="promoCode"
          name="promoCode"
          placeholder="Introduce tu código"
        />
      </div>

      <button class="search-btn" (click)="buscar()">Buscar</button>
    </div>
  </div>
</section>
<app-cars-carusel></app-cars-carusel>
<app-noticias></app-noticias>
<app-faq></app-faq>
