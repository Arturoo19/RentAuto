<div class="main">
  <h3>Introduce tus datos para entrar</h3>

  <form action="">
    <label for="first"> Email: </label>
    <input type="email" placeholder="Introduce tu email" />

    <label for="password"> Contraseña: </label>
    <input
      type="password"
      id="password"
      name="password"
      placeholder="Introduce tu contraseña"
      required
    />

    <div class="wrap">
      <button type="submit">Login</button>
    </div>
  </form>

  <p>
    No estas registrado?
    <a routerLink="/register">Crear la cuenta</a>
  </p>
</div>
