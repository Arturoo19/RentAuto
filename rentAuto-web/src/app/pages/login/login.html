<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo" routerLink="/home">
      <img src="/logo.png" alt="RentAuto" />
    </div>

    <h2>Bienvenido de nuevo</h2>
    <p class="auth-subtitle">Inicia sesión para gestionar tus reservas</p>

    <form (ngSubmit)="login()">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <p class="error" *ngIf="loginError">{{ loginError }}</p>

      <button type="submit" class="auth-btn">Iniciar sesión</button>
    </form>

    <p class="auth-switch">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate gratis</a>
    </p>
  </div>
</div>
