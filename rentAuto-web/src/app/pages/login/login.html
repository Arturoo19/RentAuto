<div class="main">
  <h3>Introduce tus datos para entrar</h3>

  <form (ngSubmit)="login()">
    <label>Email:</label>
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      placeholder="Introduce tu email"
      required
    />

    <label>Contraseña:</label>
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      placeholder="Introduce tu contraseña"
      required
    />

    <div class="wrap">
      <button type="submit">Login</button>
    </div>
  </form>

  <p>
    No estas registrado?
    <a routerLink="/register">Crear la cuenta</a>
  </p>
</div>
