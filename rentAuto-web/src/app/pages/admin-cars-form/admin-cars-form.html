<div class="admin-form-page">
  <div class="admin-form-header">
    <h1>{{ isEdit ? 'Editar coche' : 'Añadir coche' }}</h1>
    <p>{{ isEdit ? 'Actualiza los datos del vehículo' : 'Completa los detalles para publicar un nuevo coche' }}</p>
  </div>

  <div *ngIf="!dataLoaded" class="loading-spinner">Cargando...</div>

  <form *ngIf="dataLoaded" class="car-form" (ngSubmit)="save()">
    <div class="form-group half">
      <label>Marca</label>
      <input [(ngModel)]="car.brand" name="brand" required placeholder="Toyota" />
    </div>

    <div class="form-group half">
      <label>Modelo</label>
      <input [(ngModel)]="car.model" name="model" required placeholder="Corolla" />
    </div>

    <div class="form-group half">
      <label>Año</label>
      <input [(ngModel)]="car.year" name="year" type="number" required />
    </div>

    <div class="form-group half">
      <label>Precio por día (€)</label>
      <input [(ngModel)]="car.pricePerDay" name="pricePerDay" type="number" required />
    </div>

    <div class="form-group">
      <label>URL de imagen</label>
      <input [(ngModel)]="car.imageUrl" name="imageUrl" placeholder="https://..." />
    </div>

    <div class="form-group">
      <label>Descripción</label>
      <textarea [(ngModel)]="car.description" name="description" rows="3"></textarea>
    </div>

    <div class="form-group half">
      <label>Estado</label>
      <select [(ngModel)]="car.status" name="status">
        <option value="Disponible">Disponible</option>
        <option value="En Mantenimiento">En Mantenimiento</option>
      </select>
    </div>

    <div class="form-group half">
      <label>Categoría</label>
      <select [(ngModel)]="car.category" name="category">
        <option value="">Sin categoría</option>
        <option value="deportivo">Deportivo</option>
        <option value="suv">SUV</option>
        <option value="electricos">Eléctricos</option>
        <option value="lujo">De Lujo</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="button" routerLink="/cars" class="btn-cancel">Cancelar</button>
      <button type="submit" class="btn-save" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
