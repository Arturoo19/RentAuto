<div class="cars-page">
  <div class="cars-header">
    <h1>Nuestros coches</h1>
    <button *ngIf="esAdmin" routerLink="/admin/cars/new" class="btn-add">+ Añadir coche</button>
  </div>

  <div *ngIf="loading" class="loading">Cargando...</div>

  <div class="cars-grid" *ngIf="!loading">
    <div class="car-card" *ngFor="let car of cars">
      <img [src]="car.imageUrl || '/car-placeholder.png'" [alt]="car.brand + ' ' + car.model" />
      <div class="car-info">
        <h3>{{ car.brand }} {{ car.model }}</h3>
        <p class="year">{{ car.year }}</p>
        <p class="price">{{ car.pricePerDay }}€ / día</p>
        <p class="status" [ngClass]="getStatusClass(car.status)">{{ getStatusLabel(car.status) }}</p>
      </div>
      <div class="car-actions">
        <button
          class="btn-rent"
          *ngIf="isDisponible(car.status)"
          [routerLink]="['/reservar', car.id]"
          [queryParams]="{ startDate: startDate, endDate: endDate }"
        >
          Reservar
        </button>
        <span *ngIf="!isDisponible(car.status) && !esAdmin" class="service-note">En servicio</span>
        <div *ngIf="esAdmin" class="admin-actions">
          <button class="btn-edit" [routerLink]="['/admin/cars/edit', car.id]">Editar</button>
          <button class="btn-service" (click)="toggleMaintenance(car)">
            {{ isDisponible(car.status) ? 'Enviar a servicio' : 'Hacer disponible' }}
          </button>
          <button class="btn-delete" (click)="deleteCar(car.id)">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <p *ngIf="!loading && cars.length === 0" class="no-cars">No hay coches disponibles</p>
</div>
